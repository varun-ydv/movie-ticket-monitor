name: Check Movie Tickets

on:
  schedule:
    # Every hour, 24/7
    - cron: '0 * * * *'
  workflow_dispatch: # Manual trigger for testing
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state changes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run ticket monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit state changes
        run: |
          git config user.name "Ticket Bot"
          git config user.email "ticket-bot[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --staged --quiet || git commit -m "state: update $(date -u +%Y-%m-%dT%H:%M)"
          git push
